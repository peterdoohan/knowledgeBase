  # Summary 1: reinert2021_mouse_prefrontal_categorization.md
  - source_summary: raw/summaries/reinert2021_mouse_prefrontal_categorization.md
    source_title: "Mouse prefrontal cortex represents learned rules for categorization"
    source_year: 2021
    facts:
      - claim: "mPFC neurons gradually acquire category selectivity during rule-based visual categorization learning, with 9.8% becoming category-selective after learning rule 1"
        evidence: "Longitudinal two-photon calcium imaging across 5-8 time points; CTI > 0.1 threshold for category selectivity"
        topics:
          brain_regions: [medial_prefrontal_cortex, prelimbic_cortex, infralimbic_cortex]
          behaviours: [categorization, rule_learning, visual_discrimination]
          computational_frameworks: [category_representation, mixed_selectivity]
          methods: [two_photon_calcium_imaging, chronic_imaging, microprism]
        confidence: high

      - claim: "Go- and NoGo-preferring category-selective populations show distinct learning dynamics: Go neurons emerge rapidly (ad hoc, T2-T5) while NoGo neurons emerge gradually (T4-T5)"
        evidence: "Time course analysis of category-selective neuron emergence; Go category neurons tracked learning progress while NoGo neurons accumulated with categorization demand"
        topics:
          brain_regions: [medial_prefrontal_cortex]
          behaviours: [categorization, reinforcement_learning, Go_NoGo]
          computational_frameworks: [temporal_difference_learning, value_representation]
          methods: []
        confidence: high

      - claim: "After a rule-switch, Go category-selective neurons remap their stimulus selectivity while NoGo category-selective neurons are replaced by a new population"
        evidence: "8.6% of neurons encoded new categories after rule-switch; rule 1 selectivity dropped to 0.07% while rule 2 selectivity emerged in a new population"
        topics:
          brain_regions: [medial_prefrontal_cortex]
          behaviours: [cognitive_flexibility, rule_switching, categorization]
          computational_frameworks: [adaptive_coding, population_dynamics]
          methods: []
        confidence: high

      - claim: "4.3% of mPFC neurons are uniquely category-modulated, not explained by choice, reward, or uninstructed behaviors (whisking, eye movements, posture)"
        evidence: "Linear regression decomposition; category-modulated neurons identified as those with significant category coefficient but not choice/reward/movement coefficients"
        topics:
          brain_regions: [medial_prefrontal_cortex]
          behaviours: [categorization, abstract_representation]
          computational_frameworks: [mixed_selectivity, abstract_coding]
          methods: [regression_analysis, deeplabcut]
        confidence: high

      - claim: "Mice generalize learned rules to novel stimuli upon first presentation, with performance on novel and experienced stimuli not significantly different"
        evidence: "Generalization test with 18 novel stimuli; d' comparison p=0.50 for rule 1, p=0.09 for rule 2"
        topics:
          brain_regions: []
          behaviours: [generalization, rule_learning, categorization]
          computational_frameworks: [abstract_representation]
          methods: []
        confidence: high

