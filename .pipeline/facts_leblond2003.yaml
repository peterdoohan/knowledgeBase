  - claim: "Step cycle duration in spinal mice is significantly longer than intact mice due to prolonged stance rather than swing phase"
    evidence: "Mean step cycle: spinal 700±64 ms vs intact 500±94 ms (p<0.0005); stance duration increased while swing remained invariant (~100-180 ms)"
    topics:
      brain_regions: [spinal_cord]
      behaviours: [locomotion, gait_analysis]
      computational_frameworks: []
      methods: [kinematic_analysis]
    confidence: high
    historical_context: established

  - claim: "Mice are more similar to cats than rats in their capacity for spontaneous spinal locomotion recovery"
    evidence: "Adult rats require pharmacological intervention for recovery; adult mice and cats recover spontaneously; establishes mice as suitable model for spinal cord injury research"
    topics:
