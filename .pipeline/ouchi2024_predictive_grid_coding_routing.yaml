source_summary: raw/summaries/ouchi2024_predictive_grid_coding.md
source_title: "Predictive grid coding in the medial entorhinal cortex"
source_year: 2024
routing:
  - fact_index: 0
    claim: "A distinct population of medial entorhinal cortex neurons, termed predictive grid cells, have grid firing fields shifted ahead of the animal's current position, encoding future locations"
    evidence: "305 predictive grid cells identified across 6 rats; maximum gridness at mean forward shift of 22.5 ± 10.2 cm (~0.27 of grid spacing)"
    targets:
      - path: wiki/brain_regions/medial_entorhinal_cortex.md
        section: "## Key evidence"
        reason: "Predictive grid cells as distinct functional subtype"
      - path: wiki/behaviours/grid_cells.md
        section: "## Key evidence"
        reason: "New predictive grid cell subtype"
    action: route

  - fact_index: 1
    claim: "Predictive grid cells fire at the trough (~180°) of CA1 theta oscillations, opposite to phase-locked grid cells and distinct from phase-precessing cells"
    evidence: "Theta phase analysis showed predictive grid cells phase-locked to trough (~180°); phase-locked cells fired at opposite phase; phase-precessing cells showed different phase relationships"
    targets:
      - path: wiki/brain_regions/medial_entorhinal_cortex.md
        section: "## Key evidence"
        reason: "Theta phase specificity of predictive grid cells"
      - path: wiki/behaviours/grid_cells.md
        section: "## Key evidence"
        reason: "Phase-locking properties of grid cell subtypes"
    action: route

  - fact_index: 2
    claim: "Predictive grid cells are predominantly located in MEC layer 3; phase-precessing cells in layer 2; phase-locked cells in layer 3 with opposite phase preference"
    evidence: "Laminar analysis showed predictive grid cells concentrated in layer 3; phase-precessing cells in layer 2; phase-locked cells also in layer 3 but with opposite theta phase preference"
    targets:
      - path: wiki/brain_regions/medial_entorhinal_cortex.md
        section: "## Key evidence"
        reason: "Laminar organization of grid cell functional subtypes"
      - path: wiki/behaviours/grid_cells.md
        section: "## Key evidence"
        reason: "Layer-specific grid cell properties"
    action: route

  - fact_index: 3
    claim: "Bayesian decoding using predictive, phase-precessing, and phase-locked cells together reveals theta sequences sweeping from current to future positions across each theta cycle"
    evidence: "Decoding showed position sweep from current to future across theta cycle; removing predictive grid cell spikes significantly reduced representation of future positions during descending theta phases"
    targets:
      - path: wiki/brain_regions/medial_entorhinal_cortex.md
        section: "## Key evidence"
        reason: "MEC contribution to theta sequences"
      - path: wiki/brain_regions/hippocampus_ca1.md
        section: "## Key evidence"
        reason: "Theta sequences in CA1 depend on MEC predictive input"
      - path: wiki/behaviours/hippocampal_replay.md
        section: "## Key evidence"
        reason: "Theta sequences as prospective coding mechanism"
    action: route

  - fact_index: 4
    claim: "Disrupting spike synchronisation within theta cycles abolishes future-position representation, implicating coordinated assembly activity rather than single-cell coding"
    evidence: "Synchrony disruption specifically abolished future-position representation while preserving current-position coding; implicates coordinated population activity for predictive coding"
    targets:
      - path: wiki/brain_regions/medial_entorhinal_cortex.md
        section: "## Key evidence"
        reason: "Population synchrony for predictive coding"
      - path: wiki/behaviours/grid_cells.md
        section: "## Key evidence"
        reason: "Assembly-level coding in grid cells"
    action: route

  - fact_index: 5
    claim: "Cross-correlogram analysis shows increased functional connectivity from predictive grid cells to CA1 place cells when the grid field precedes the place field, suggesting directional spike transmission"
    evidence: "CCG analysis showed predictive grid cell firing leads CA1 place cell activity when grid field spatially precedes place field; consistent with feedforward predictive drive from MEC to hippocampus"
    targets:
      - path: wiki/brain_regions/medial_entorhinal_cortex.md
        section: "## Key evidence"
        reason: "Functional connectivity to hippocampus"
      - path: wiki/brain_regions/hippocampus_ca1.md
        section: "## Key evidence"
        reason: "Predictive input from MEC grid cells"
    action: route

  - fact_index: 6
    claim: "Predictive coding properties are preserved across goal-directed and random-foraging tasks, with grid spacing rescaling but position-shift bias and phase preferences maintained"
    evidence: "Interleaved goal-directed and random-foraging tasks showed preserved predictive coding properties; grid spacing rescaled with environment but forward shift and theta phase preferences unchanged"
    targets:
      - path: wiki/brain_regions/medial_entorhinal_cortex.md
        section: "## Key evidence"
        reason: "Generalized predictive coding beyond goal-directed contexts"
      - path: wiki/behaviours/grid_cells.md
        section: "## Key evidence"
        reason: "Universal predictive properties of grid cells"
    action: route
