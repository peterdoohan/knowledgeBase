  - fact_index: 5
    claim: "MicroPython's automatic garbage collection in pyControl can introduce brief pauses that affect digital input processing when multiple edges occur during a single garbage collection episode"
    evidence: "Only the last edge is processed when multiple edges arrive on a single digital input during garbage collection; timers that elapse during garbage collection are processed immediately afterwards with correct timestamps"
    targets:
